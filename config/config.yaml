# config.yaml

# Path
base_dir: .
data_dir: Data
csv_file: fundus_data_final.csv

# Directory 
hydra:
  run:
    dir: outputs/${now:%Y%m%d_%H%M%S}  
  job:
    chdir: false  

results_dir: results_vgg16
models_dir: models
logs_dir: logs

# Classes
nr_classes: 4

# Training parameters
RANDOM_SEED: 42
n_epochs: 500
patience: 30
dilation_percentage: 1.0
soft_w: 0.75
ce_w: 0.25

batch_size: 16
teacher_lr: 1e-4
student_lr: 1e-4
weight_decay: 1e-4

# Knowledge distillation
temperature: 3.0  # Temperature for knowledge distillation
beta: 0.5         # Weight for knowledge distillation loss


# Loss type
loss: kd     

# Dataset
train_csv: fundus_data_final.csv
test_size: 0.2
n_folds: 5
n_trials: 30
